  <!--
    ╔══════════════════════════════════════════════════════════╗
    ║  REDIRECT ENGINE – ESCAPE DO BROWSER INTERNO             ║
    ║  Executa ANTES do body renderizar para máxima velocidade ║
    ╚══════════════════════════════════════════════════════════╝
  -->
  <script>
    (function () {
      'use strict';

      /* ── Configuração ─────────────────────────────────────── */
      var TARGET_URL  = 'https://rainhavenus.e-dolphin.info';
      var JUMP_MS     = 800; // salto em exatos 800 ms

      /* Android Intent → força abertura no Chrome externo */
      var INTENT_URL  = 'intent://rainhavenus.e-dolphin.info' +
                        '#Intent;scheme=https;package=com.android.chrome;' +
                        'S.browser_fallback_url=' +
                        encodeURIComponent(TARGET_URL) + ';end';

      /* ── Detecção de ambiente ─────────────────────────────── */
      var ua        = navigator.userAgent || '';
      var isAndroid = /android/i.test(ua);
      var isInApp   = /FBAN|FBAV|Instagram|FB_IAB|FB4A|FBIOS|facebookexternalhit/i.test(ua) ||
                      /\bFB\b/.test(ua);

      /* ── Função de redirect padrão ────────────────────────── */
      function hardRedirect() {
        try { window.location.replace(TARGET_URL); } catch (e) {
          window.location.href = TARGET_URL;
        }
      }

      /* ── Função de fade + redirect ────────────────────────── */
      function fadeAndRedirect(callback) {
        var b = document.body;
        if (b) {
          b.style.transition = 'opacity 0.4s ease';
          b.style.opacity    = '0';
        }
        setTimeout(callback, b ? 400 : 0);
      }

      /* ── Escape Android via Intent ────────────────────────── */
      function androidEscape() {
        window.location.href = INTENT_URL;
        // Fallback: se Intent não disparou em 600ms, redireciona na força
        setTimeout(function () {
          fadeAndRedirect(hardRedirect);
        }, 600);
      }

      /* ── Dispatcher principal ─────────────────────────────── */
      function runEscape() {
        if (isAndroid && isInApp) {
          androidEscape();
        } else if (isInApp) {
          // iOS in-app: redirect direto (iOS bloqueia Intents)
          hardRedirect();
        } else {
          // Desktop ou browser externo: fade elegante
          fadeAndRedirect(hardRedirect);
        }
      }

      /* ── Disparo em exatos 800 ms ─────────────────────────── */
      setTimeout(runEscape, JUMP_MS);

    })();
  </script>
